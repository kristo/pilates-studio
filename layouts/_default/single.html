{{ define "main" }}
<header class="bg-primary text-white">
  <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
    <a href="/" class="text-lg font-semibold hover:text-accent transition-colors">Pure Shape Studio</a>
    <a href="/" class="text-sm md:text-base hover:text-accent transition-colors">Powrót na stronę główną</a>
  </div>
</header>

<main class="py-20 bg-white">
  <div class="max-w-4xl mx-auto px-6">
    <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-primary text-center mb-6">{{ .Title }}</h1>
    {{ with .Params.subtitle }}
      <p class="text-center text-gray-600 text-lg max-w-2xl mx-auto mb-14">{{ . }}</p>
    {{ end }}

    <article class="space-y-6 text-gray-700 [&_h2]:text-2xl [&_h2]:font-bold [&_h2]:text-primary [&_h2]:mt-10 [&_h2]:mb-4 [&_ol]:list-decimal [&_ol]:list-inside [&_ol]:space-y-3 [&_ol]:leading-relaxed [&_ul]:list-disc [&_ul]:list-inside [&_ul]:space-y-2 [&_ul]:leading-relaxed [&_p]:leading-relaxed [&_a]:text-accent [&_a]:hover:underline">
      {{ .Content }}
    </article>
  </div>
</main>
{{ end }}
